<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fabric Purchase — Creators Studio</title>
  <meta name="description" content="Record a fabric purchase entry.">
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/purchase.css">
</head>
<body class="purchase-page">
  <div id="toast-container"></div>
  <div class="card purchase-card">
    <div class="logo-wrap">
      <img src="../images/logo.jpeg" alt="Creators Studio Logo" class="logo-img">
      <span class="app-title">Creators Studio</span>
    </div>
    <div class="breadcrumb">Purchasing bills / Categories / Fabrics</div>

    <h1 id="page-heading" style="text-align:center;margin-bottom:1.25rem">Fabrics</h1>

    <form id="fabric-form" novalidate>
      <!-- Fabric Name -->
      <div class="form-group">
        <label class="form-label" for="fabric-name-select">Fabric Name</label>
        <select id="fabric-name-select" class="form-control" required></select>
        <div class="manual-input-wrap" id="fabric-name-manual-wrap">
          <input id="fabric-name-manual" type="text" class="form-control" placeholder="Enter fabric name">
        </div>
      </div>

      <!-- Fabric Type -->
      <div class="form-group">
        <label class="form-label" for="fabric-type-select">Fabric Type</label>
        <select id="fabric-type-select" class="form-control" required></select>
        <div class="manual-input-wrap" id="fabric-type-manual-wrap">
          <input id="fabric-type-manual" type="text" class="form-control" placeholder="Enter fabric type">
        </div>
      </div>

      <hr class="section-divider">

      <!-- Dynamic Fabric Item Rows -->
      <div id="fabric-rows"></div>

      <button type="button" id="add-row-btn" class="add-row-btn">+ Add Colour Entry</button>

      <!-- Total Price -->
      <div class="total-section" style="margin-top:1rem">
        <div class="total-label">Total Price</div>
        <div class="total-value" id="total-price-display">₹0.00</div>
        <input type="hidden" id="total-price-hidden">
      </div>

      <div class="page-actions" style="margin-top:1.5rem">
        <button type="button" id="go-back-btn" class="btn btn-ghost">Go Back</button>
        <button type="submit" id="submit-btn" class="btn btn-primary">Submit</button>
      </div>
    </form>
  </div>

  <script src="../js/common.js"></script>
  <script src="../js/fabric-purchase.js"></script>
</body>
</html>

# ===================================================================
# Creators Studio - Application Configuration
# ===================================================================

# Application Name
spring.application.name=creators-studio

# ===================================================================
# Server Configuration
# ===================================================================
server.port=8080

# ===================================================================
# MySQL Database Configuration
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/creators_studio?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# JPA / Hibernate Configuration
# ===================================================================

# Hibernate DDL auto strategy
# update: Hibernate updates the schema to match entity mappings
# validate: Hibernate validates the schema (use in production)
# create: Drops and recreates schema on each startup
# create-drop: Like create, but drops schema when SessionFactory closes
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (disable in production)
spring.jpa.show-sql=true

# Format SQL output for readability
spring.jpa.properties.hibernate.format_sql=true

# MySQL Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===================================================================
# Logging Configuration
# ===================================================================
logging.level.com.creatorsstudio=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

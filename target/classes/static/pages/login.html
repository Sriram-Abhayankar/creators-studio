<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Creators Studio</title>
  <meta name="description" content="Log in to Creators Studio expense management application.">
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body class="auth-page">
  <div id="toast-container"></div>
  <div class="card auth-card">
    <div class="logo-wrap">
      <img src="../images/logo.jpeg" alt="Creators Studio Logo" class="logo-img">
      <span class="app-title">Creators Studio</span>
      <span class="page-subtitle">Login</span>
    </div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input id="username" type="text" class="form-control" placeholder="Enter username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" type="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
      </div>
      <div id="error-msg" style="color:var(--error);font-size:0.85rem;margin-bottom:0.75rem;min-height:1.2em;"></div>
      <button id="login-btn" type="submit" class="btn btn-primary btn-full">Login</button>
    </form>

    <div class="auth-footer">
      <span class="link" onclick="window.location.href='/pages/register.html'">Don't have an account?</span>
    </div>
  </div>

  <script src="../js/common.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
